<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Plant Survey">
  <meta name="theme-color" content="#2d7a2d">
  <title>Native Plant Survey</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <div id="login-view" class="hidden">
      <div class="login-content">
        <h1>Native Plant Survey</h1>
        <p>Field survey tool for recording native plant coverage by neighborhood.</p>
        <button id="sign-in-btn">Sign in with Google</button>
        <p id="login-error" class="login-error"></p>
      </div>
    </div>

    <div id="field-view" class="hidden">
      <header class="app-header">
        <span id="user-email" class="user-email"></span>
        <button id="sign-out-btn" class="sign-out-btn">Sign out</button>
      </header>
      <main id="field-main">
        <div id="address-bar">
          <span id="address-display">Getting location…</span>
        </div>
        <div id="save-error" class="save-error hidden"></div>
        <div id="save-toast" class="save-toast hidden">Saved!</div>
        <div id="tap-area">
          <button id="yes-btn" class="tap-btn tap-yes" disabled>
            <span class="tap-label">YES</span>
            <span class="tap-sub">Has native plants</span>
          </button>
          <button id="no-btn" class="tap-btn tap-no" disabled>
            <span class="tap-label">NO</span>
            <span class="tap-sub">No native plants</span>
          </button>
        </div>
      </main>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
